<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | Shidak Collections</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="images.png.jpg" class="logo-img" alt="Shidak Collections Logo">
            <span>SHIDAK COLLECTIONS</span>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
            <a href="cart.html" class="cart-icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </a>
        </nav>
    </header>

    <!-- WISHLIST SECTION -->
    <section class="wishlist-section">
        <h1>Your Wishlist</h1>
        <div class="wishlist-products" id="wishlist-products">
            <!-- Wishlist items will appear here dynamically -->
        </div>
        <p id="empty-msg" style="text-align:center; color:#fff; margin-top:20px;">Your wishlist is empty 😔</p>
    </section>

    <!-- FOOTER -->
    <footer>
        © 2026 Shidak Collections. All Rights Reserved.
    </footer>

    <!-- JS -->
    <script src="wishlist.js"></script>
</body>

</html>
